dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3000
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers:
    - desktop
projects:
  automatic-launcher:
    name: automatic-launcher
    sessionPrefix: al
    repo: NikitaDmitrieff/automatic-launcher
    path: /tmp/jobs/automatic-launcher
    defaultBranch: main
    agentRules: >-
      You are building Automatic Launcher — a lean launch copilot for solo indie hackers.


      ## Project Vision

      A minimalist glassmorphism web app where indie hackers input their project details and get:
      1. A concise, actionable launch plan
      2. Personalized channel recommendations with concrete links
      3. An outreach playbook with templates
      4. Early validation and sales actions


      ## Tech Stack

      - Next.js 15 (App Router), React 19, Tailwind CSS v4, TypeScript

      - Vitest for testing

      - Use pnpm as package manager

      - Hybrid recommendation engine (rules + AI-generated advice)


      ## Rules

      - NO interactive prompts — if something needs a credential, skip and log clearly

      - Use conventional commits (feat:, fix:, test:, docs:, chore:)

      - Link issue numbers in commit messages

      - Keep glassmorphism aesthetic consistent: backdrop-blur, semi-transparent backgrounds, subtle borders, dark theme

      - Mobile-first responsive design

      - All components in src/components/, logic in src/lib/, types in src/types/

      - Use functional components with hooks

      - Use Server Components by default, Client Components only when needed

      - Run pnpm install before starting if node_modules is missing

      - Before pushing run: pnpm lint and pnpm test (skip if scripts not yet available)

      - Prefer const over let, never use var

      - No any types - use unknown with type guards instead
